{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MASJID BANDAR RINCHING</title>

    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: Arial, Helvetica, sans-serif;
        }

        .images {
            margin: 20px;
            position: absolute;
            top: 10px;
            left: 10px;
        }

        .images img {
            width: 40px;
            height: 40px;
            cursor: pointer;
        }

        main {
            flex: 1;
            margin-top: 10%;
        }

        .container {
            background: white;
            max-width: 600px;
            margin: 40px auto;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            color: #232a31;
        }
        
        label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
        }

        input, textarea, select {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 6px;
        }

        input[readonly] {
            background-color: #eee;
            cursor: not-allowed;
        }

        button {
            background: #0066cc;
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            margin-top: 20px;
            border-radius: 6px;
            font-size: 16px;
        }

        button:hover {
            background: #004999;
        }


    </style>
</head>
<body>

    <div class="images">
        <a href="{% url 'more_info' program.id %}">
            <img src="{% static 'arrow.png' %}" alt="back">
        </a>
    </div>

    <main>
        <div class="container">
        <h2>Register Program</h2>
        <form method="POST">
            {% csrf_token %}

            <label>PROGRAM TITLE</label>
            <input type="text" name="progTitle" value="{{ program.progTitle}}" readonly>

            <label>NAME</label>
            <input type="text" name="regName" required>

            <label>IC</label>
            <input type="text" name="regIc" required>

            <label>EMAIL</label>
            <input type="email" name="regEmail" required>

            <button type="submit" onclick="showSuccess()">Register Program</button>
            </form>
        </div>

    </main>

    <script>
        function showSuccess() {
            const name = document.querySelector('[name="regName"]').value.trim();
            const ic = document.querySelector('[name="regIc"]').value.trim();
            const email = document.querySelector('[name="regEmail"]').value.trim();

        if (!name || !ic || !email) {
            alert("Please fill in all required fields!");
            return false; 
        }

        alert("Successfully Register!");
        return true; 
    }
    </script>

</body>
</html>
