{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MASJID BANDAR RINCHING</title>

    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: Arial, Helvetica, sans-serif;
        }

        .container {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 220px;
            background-color: #232a31;
            color: white;
            display: flex;
            flex-direction: column;
            padding: 20px;
            gap: 20px;
        }

        .sidebar .brand {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .sidebar nav {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .sidebar nav a {
            color: white;
            text-decoration: none;
            padding: 10px;
            border-radius: 4px;
        }

        .sidebar nav a:hover,
        .sidebar nav a.active {
            background-color: #004999;
        }

        .sidebar .welcome-msg {
            font-size: 20px;
            font-weight: bold;
            color: #e0e0e0;
        }


        main.dashboard {
            flex-grow: 1;
            padding: 40px 30px;
            width: 100%;
        }

        .form-container {
            max-width: 600px;
            margin: 0 auto;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        h2 {
            text-align: center;
            color: #232a31;
            margin-bottom: 30px;
        }

        label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
        }

        input, textarea, select {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 6px;
        }

        button {
            background: #0066cc;
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            margin-top: 20px;
            border-radius: 6px;
            font-size: 16px;
        }

        button:hover {
            background: #004999;
        }

    </style>
</head>
<body>
    <div class="container">
        <aside class="sidebar">
            <div class="brand">
                <strong>MASJID BANDAR RINCHING</strong>
            </div>
            
            <div class="welcome-msg">
                Welcome, {{ request.user.username }}!
            </div>
            
                <nav>
                <a href="{% url 'admin_dashboard' %}">Dashboard</a>
                <a href="{% url 'addprogram' %}">Add Program</a>
                <a href="#" class="active">Add Instructor</a>
                <a href="{% url 'dashboard_program' %}">Manage Program</a>
                <a href="{% url 'dashboard_register' %}">Manage Registration</a>
                <a href="{% url 'dashboard_instructor' %}">Manage Instructor</a>
                <a href="{% url 'dashboard_feedback' %}">Manage Feedback</a>
                <a href="{% url 'homepage' %}">Logout</a>
            </nav>
        </aside>

        <main class="dashboard">
            <div class="form-container">
                <h2>ADD NEW INSTRUCTOR</h2>
                    <form method="POST">
                        {% csrf_token %}

                        <label>ID</label>
                        <input type="text" name="insId" required>

                        <label>NAME</label>
                        <input type="text" name="insName" required>

                        <label>IC</label>
                        <input type="text" name="insIC" required>

                        <label>PHONE NUMBER</label>
                        <input type="text" name="insNumber" required>

                        <label>EMAIL</label>
                        <input type="email" name="insEmail" required>

                        <button type="submit" onclick="showSuccess()">ADD INSTRUCTOR</button>
                    </form>
            </div>
        </main>
    </div>

    <script>
        function showSuccess() {
            const insId = document.querySelector('[name="insId"]').value.trim();
            const name = document.querySelector('[name="insName"]').value.trim();
            const ic = document.querySelector('[name="insIc"]').value.trim();
            const number = document.querySelector('[name="insNumber"]').value.trim();
            const email = document.querySelector('[name="insEmail"]').value.trim();

        if (!insId || !name || !ic || !number || !email) {
            alert("Please fill in all required fields!");
            return false; 
        }

        alert("Successfully Edit!");
        return true; 
    }
    </script>

</body>
</html>
