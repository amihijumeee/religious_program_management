{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MASJID BANDAR RINCHING</title>

    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: Arial, Helvetica, sans-serif;
        }

        .container {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 220px;
            background-color: #232a31;
            color: white;
            display: flex;
            flex-direction: column;
            padding: 20px;
            gap: 20px;
        }

        .sidebar .brand {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .sidebar nav {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .sidebar nav a {
            color: white;
            text-decoration: none;
            padding: 10px;
            border-radius: 4px;
        }

        .sidebar nav a:hover,
        .sidebar nav a.active {
            background-color: #004999;
        }

        .sidebar .welcome-msg {
            font-size: 20px;
            font-weight: bold;
            color: #e0e0e0;
        }


        main.dashboard {
            flex-grow: 1;
            padding: 40px 30px;
            width: 100%;
        }

        .form-container {
            max-width: 600px;
            margin: 0 auto;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        h2 {
            text-align: center;
            color: #232a31;
            margin-bottom: 30px;
        }

        label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
        }

        input, textarea, select {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 6px;
        }

        button {
            background: #0066cc;
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            margin-top: 20px;
            border-radius: 6px;
            font-size: 16px;
        }

        button:hover {
            background: #004999;
        }

    </style>
</head>
<body>
    <div class="container">
        <aside class="sidebar">
            <div class="brand">
                <strong>MASJID BANDAR RINCHING</strong>
            </div>
            
            <div class="welcome-msg">
                Welcome, {{ request.user.username }}!
            </div>
            
                <nav>
                <a href="{% url 'admin_dashboard' %}">Dashboard</a>
                <a href="#" class="active">Add Program</a>
                <a href="{% url 'add_instructor' %}">Add Instructor</a>
                <a href="{% url 'dashboard_program' %}">Manage Program</a>
                <a href="{% url 'dashboard_register' %}">Manage Registration</a>
                <a href="{% url 'dashboard_instructor' %}">Manage Instructor</a>
                <a href="{% url 'dashboard_feedback' %}">Manage Feedback</a>
                <a href="{% url 'homepage' %}">Logout</a>
            </nav>
        </aside>

        <main class="dashboard">
            <div class="form-container">
                <h2>ADD NEW PROGRAM</h2>
                <form method="POST">
                {% csrf_token %}
                    <label>TITLE</label>
                    <input type="text" name="progTitle" required>

                    <label>DESCRIPTION</label>
                    <textarea name="progDescription" required></textarea>

                    <label>DATE</label>
                    <input type="date" name="progDate" required>

                    <label>TIME</label>
                    <input type="time" name="progTime" required>

                    <label>INSTRUCTOR</label>
                    <select name="progInstructor">
                        {% for instructor in instructors %}
                            <option value="{{ instructor.insId }}">{{ instructor.insName }}</option>
                        {% endfor %}
                    </select>

                    <label>VENUE</label>
                    <input type="text" name="progVenue" required>

                    <label>CAPACITY</label>
                    <input type="number" name="progCapacity" required min="1" required>

                    <label>REGISTRATION</label>
                    <select name="progRegistration" required>
                        <option value="True">YES</option>
                        <option value="False">NO</option>
                    </select>

                    <button type="submit" onclick="showSuccess()">ADD PROGRAM</button>
                </form>
            </div>
        </main>
    </div>

    <script>
        function showSuccess() {
            const title = document.querySelector('[name="progTitle"]').value.trim();
            const description = document.querySelector('[name="progDescription"]').value.trim();
            const date = document.querySelector('[name="progDate"]').value;
            const time = document.querySelector('[name="progTime"]').value;
            const venue = document.querySelector('[name="progVenue"]').value.trim();
            const capacity = document.querySelector('[name="progCapacity"]').value;

        if (!title || !description || !date || !time || !venue || !capacity) {
            alert("Please fill in all required fields!");
            return false;
        }

        alert("Successfully Add!");
        return true;
    }
    </script>

</body>
</html>
